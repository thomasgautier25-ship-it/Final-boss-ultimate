<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Final Boss Ultimate</title>
</head>
<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

  <h1>🔥 Final Boss Ultimate 🔥</h1>

  <p id="match"></p>
  <p id="prediction"></p>

  <button onclick="predict()">Lancer Analyse</button>

  <script>
    function predict() {
      const teamA = "Paris";
      const teamB = "Adversaire";

      // exemple simple basé sur ton info 5-2
      let prob = 75;

      document.getElementById("match").innerText =
        teamA + " vs " + teamB;

      document.getElementById("prediction").innerText =
        "Probabilité victoire " + teamA + " : " + prob + "% 🔥";
    }
  </script>

</body>
</html>
